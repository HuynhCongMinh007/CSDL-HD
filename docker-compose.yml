services:
  backend:
    build:
      context: ./
    container_name: food-delivery-backend
    depends_on:
      - mongodb
      - cassandra
      - neo4j
      - redis
    env_file:
      - ./.env
    ports:
      - "3000:3000"

  cassandra:
    image: cassandra:latest
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra

  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password_123
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:alpine
    ports: 
      - "6379:6379"

  mongodb:
    image: mongo:8.2.3
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db
      - mongo_config:/etc/mongo

volumes:
  cassandra_data:
  neo4j_data:
  mongo_data:
  mongo_config: